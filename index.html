<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        var saved = localStorage.getItem('theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (saved === 'dark' || (!saved && prefersDark)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#f8fafc" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Morning Brew Slideshow</title>

    <!-- Primary Meta Tags -->
    <meta name="title" content="Morning Brew Slideshow" />
    <meta
      name="description"
      content="Morning Brew transformed into an interactive audio slideshow with progressive enrichment."
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://morning-brew-slideshow.web.app" />
    <meta property="og:title" content="Morning Brew Slideshow" />
    <meta
      property="og:description"
      content="Morning Brew transformed into an interactive audio slideshow with progressive enrichment."
    />
    <meta
      property="og:image"
      content="https://morning-brew-slideshow.web.app/social-banner.png"
    />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta
      property="twitter:url"
      content="https://morning-brew-slideshow.web.app"
    />
    <meta property="twitter:title" content="Morning Brew Slideshow" />
    <meta
      property="twitter:description"
      content="Morning Brew transformed into an interactive audio slideshow with progressive enrichment."
    />
    <meta
      property="twitter:image"
      content="https://morning-brew-slideshow.web.app/social-banner.png"
    />

    <!-- Meta Tags Generated with https://metatags.io -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
